<section class="hero" id="top" aria-label="Bree's Bakery">
  <div class="hero__media" aria-hidden="true">
    <img
      src="https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=2000&q=80"
      alt=""
    />
    <div class="hero__wash"></div>
  </div>

  <div class="hero__content">
    <p class="hero__eyebrow">Delicious Bakery</p>
    <h1 class="hero__headline">Sweet Treats, Perfect Eats.</h1>
    <p class="hero__brand">Bree's Bakery</p>
    <div class="hero__actions">
      <button type="button" class="btn btn--solid" (click)="goTo('products')">
        Shop Now
      </button>
      <button type="button" class="btn btn--outline" (click)="goTo('explore')">
        Learn More
      </button>
    </div>
  </div>
</section>
