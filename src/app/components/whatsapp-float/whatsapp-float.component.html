<div class="wa">
  @if (open()) {
    <div class="wa__panel" role="dialog" aria-label="WhatsApp chat">
      <header class="wa__head">
        <div class="wa__avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22">
            <path
              fill="currentColor"
              d="M12.04 2C6.58 2 2.15 6.4 2.15 11.83c0 1.99.58 3.85 1.6 5.44L2 22l4.88-1.63a9.9 9.9 0 0 0 5.16 1.44h.01c5.46 0 9.89-4.4 9.89-9.83C21.94 6.4 17.5 2 12.04 2Z"
            />
          </svg>
        </div>
        <div class="wa__meta">
          <p class="wa__name">Bree's Bakery</p>
          <p class="wa__status">Typically replies instantly</p>
        </div>
        <button type="button" class="wa__x" (click)="close()" aria-label="Close chat">
          ×
        </button>
      </header>

      <div class="wa__body">
        <div class="wa__bubble">
          <p>Hi there! Welcome to Bree's Bakery.</p>
          <p>Tap below to chat with us on WhatsApp — orders, custom cakes, and pickup times.</p>
        </div>
      </div>

      <button type="button" class="wa__cta" (click)="startChat()">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path
            fill="currentColor"
            d="M12.04 2C6.58 2 2.15 6.4 2.15 11.83c0 1.99.58 3.85 1.6 5.44L2 22l4.88-1.63a9.9 9.9 0 0 0 5.16 1.44h.01c5.46 0 9.89-4.4 9.89-9.83C21.94 6.4 17.5 2 12.04 2Zm5.5 13.98c-.23.64-1.33 1.17-1.85 1.24-.47.07-1.07.1-1.73-.11-.4-.12-.91-.28-1.57-.55-2.76-1.19-4.55-3.97-4.69-4.15-.14-.18-1.15-1.53-1.15-2.92 0-1.39.73-2.07.99-2.35.26-.28.57-.35.76-.35h.55c.17 0 .41-.07.64.49.23.57.79 1.97.86 2.11.07.14.12.3.02.49-.1.18-.14.3-.28.46-.14.16-.3.36-.42.48-.14.14-.28.29-.12.57.16.28.7 1.15 1.5 1.86 1.03.92 1.9 1.21 2.17 1.35.28.14.43.12.59-.07.16-.18.69-.8.87-1.08.18-.28.37-.23.62-.14.26.1 1.63.77 1.91.91.28.14.47.21.54.32.07.12.07.68-.16 1.32Z"
          />
        </svg>
        Start WhatsApp chat
      </button>
    </div>
  }

  <button
    type="button"
    class="wa__fab"
    [class.wa__fab--open]="open()"
    (click)="toggle()"
    [attr.aria-label]="open() ? 'Close WhatsApp chat' : 'Chat on WhatsApp'"
    [attr.aria-expanded]="open()"
  >
    @if (open()) {
      <span class="wa__fab-x" aria-hidden="true">×</span>
    } @else {
      <svg viewBox="0 0 24 24" aria-hidden="true" width="28" height="28">
        <path
          fill="currentColor"
          d="M12.04 2C6.58 2 2.15 6.4 2.15 11.83c0 1.99.58 3.85 1.6 5.44L2 22l4.88-1.63a9.9 9.9 0 0 0 5.16 1.44h.01c5.46 0 9.89-4.4 9.89-9.83C21.94 6.4 17.5 2 12.04 2Zm5.5 13.98c-.23.64-1.33 1.17-1.85 1.24-.47.07-1.07.1-1.73-.11-.4-.12-.91-.28-1.57-.55-2.76-1.19-4.55-3.97-4.69-4.15-.14-.18-1.15-1.53-1.15-2.92 0-1.39.73-2.07.99-2.35.26-.28.57-.35.76-.35h.55c.17 0 .41-.07.64.49.23.57.79 1.97.86 2.11.07.14.12.3.02.49-.1.18-.14.3-.28.46-.14.16-.3.36-.42.48-.14.14-.28.29-.12.57.16.28.7 1.15 1.5 1.86 1.03.92 1.9 1.21 2.17 1.35.28.14.43.12.59-.07.16-.18.69-.8.87-1.08.18-.28.37-.23.62-.14.26.1 1.63.77 1.91.91.28.14.47.21.54.32.07.12.07.68-.16 1.32Z"
        />
      </svg>
    }
  </button>
</div>
